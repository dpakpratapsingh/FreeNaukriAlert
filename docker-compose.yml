version: '3.8'

services:
  fna-postgres:
    image: postgres:16-alpine
    container_name: fna-postgres
    environment:
      POSTGRES_USER: fna_admin
      POSTGRES_PASSWORD: fna_password_123
      POSTGRES_DB: fna_database
    ports:
      - "5433:5432" # Mapping to 5433 locally to avoid port conflicts with other databases
    volumes:
      - fna_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  fna_pgdata:
